services:
  mosquitto:
    image: eclipse-mosquitto
    container_name: cloudtwin-mqtt
    ports:
      - "1883:1883"

  postgres:
    image: postgres:17
    container_name: cloudtwin-postgres

    environment:
      POSTGRES_USER: cloudtwin
      POSTGRES_PASSWORD: cloudtwin
      POSTGRES_DB: cloudtwin

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cloudtwin-redis
    ports:
      - 6379:6379

volumes:
  postgres-data: